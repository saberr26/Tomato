name: tomato
title: Tomato

contact: nishant.28@outlook.com
donation: https://coff.ee/nsh07
source-code: https://github.com/nsh07/Tomato
issues: https://github.com/nsh07/Tomato/issues
website: https://github.com/nsh07/Tomato

version: '1.8.6-alpha01'
summary: Minimalist, data-oriented pomodoro timer
description: |
  Tomato is a minimalist Pomodoro timer based on Material 3 Expressive.

  Tomato is fully free and open-source, forever. You can find the source code and report
  bugs or suggest features at https://github.com/nsh07/Tomato

  Features:
  - Simple, minimalist UI based on the latest Material 3 Expressive guidelines
  - Detailed statistics of work/study times in an easy-to-understand manner
  - Stats for the current day visible at a glance
  - Stats for the last week and last month shown in an easy-to-read, clean graph
  - Additional stats for last week and month showing at what time of the day you're the
  most productive
  - Customizable timer parameters
  - Support for Android 16 Live Updates

base: core22
confinement: strict
grade: stable
icon: shared/src/jvmMain/composeResources/drawable/logo.png
license: GPL-3.0

architectures:
  - build-on: [ amd64 ]
    build-for: [ amd64 ]

apps:
  tomato:
    command: bin/tomato-launch
    extensions: [ gnome ]
    plugs:
      - x11
      - wayland
      - desktop
      - desktop-legacy
      - audio-playback
      - opengl
      - network

parts:
  tomato:
    plugin: nil
    source: .
    build-packages:
      - openjdk-21-jdk-headless
    stage-packages:
      - libappindicator3-1
    override-build: |
      # Build the distributable
      chmod +x gradlew
      ./gradlew :desktopApp:createReleaseDistributable

      # Install the distributable
      mkdir -p $SNAPCRAFT_PART_INSTALL/opt/tomato
      cp -r desktopApp/build/compose/binaries/main-release/app/Tomato/* $SNAPCRAFT_PART_INSTALL/opt/tomato/

      # Create launcher script
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cat > $SNAPCRAFT_PART_INSTALL/bin/tomato-launch << 'EOF'
      #!/bin/sh
      exec $SNAP/opt/tomato/bin/Tomato "$@"
      EOF
      chmod +x $SNAPCRAFT_PART_INSTALL/bin/tomato-launch

      # Install desktop entry
      mkdir -p $SNAPCRAFT_PART_INSTALL/meta/gui
      cp shared/src/jvmMain/composeResources/drawable/logo.png $SNAPCRAFT_PART_INSTALL/meta/gui/icon.png
